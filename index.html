<!DOCTYPE html>
<html lang="pt-br">
    <head>
        <title>Mestre da Chapa Burger</title>
        <meta charset="UTF-8">
        <link rel="stylesheet" href="style.css" type="text/css">
        <link rel="icon" type="image/x-icon" href="img/burger icon.jpg">
    </head>
    <body>
     
    <header>
        <div class="container_logo">
            <img src="img/burgerlogo.png" alt="imagem de burger">

            <p>O verdadeiro sabor na Chapa!</p>
        </div>
    </header>

    <main>
        <div class="cards">
            <div class="container_card">
                <div class="info">

                    <h3 class="nome">Prozinho Destruido</h3>
                    <p class="descricao">
                        Pão branco, burger de 160g deformado, queijo cheddar...
                    </p>
                    <h6 class="preco">R$ 39,99</h6>
                </div>

                <img src="img/xburger_teste.jpg">
            </div>
        
            <div class="container_card">
                <div class="info">

                    <h3 class="nome">Bacon.portado</h3>
                    <p class="descricao">
                        Pão Branco, Burger de Costela 150g, Queijo Cheddar, Bacon...
                    </p>
                    <h6 class="preco">R$ 37,99</h6>
                    </div>

                <img src="img/xbacon.jpg">
            </div>

            <div class="container_card">
                <div class="info">

                    <h3 class="nome">Cheese Costela</h3>
                    <p class="descricao">
                        Pão Branco, Burger de Costela 150g, Queijo Cheddar, Cebola...
                    </p>
                    <h6 class="preco">R$ 34,99</h6>
                    </div>

                <img src="img/xtudo_teste.jpg">
            </div>
        </div>
    </main>
    </body>
</html>
